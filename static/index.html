<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>GoChat</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<div id="app">
		<h1>CHAT!</h1>
		<ul id="messages"></ul>
		<footer>
			<textarea name="message" id="message" maxlength="140" placeholder="Escribe un mensaje..."></textarea>
			<button id="send">SEND</button>
		</footer>
	</div>
	<script src="script.js"></script>
</body>
</html>
